<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Zertix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../assets/css/base.css">
</head>
<body>

<section class="auth-section">
  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-info">
      <span class="auth-tag">SECURE LOGIN</span>
      <h2>Welcome Back to<br><span>Zertix</span></h2>
      <p>Access your courses and verified certificates.</p>

      <ul class="auth-points">
        <li>Secure login</li>
        <li>Verified certificates</li>
        <li>Lifetime access</li>
      </ul>
    </div>

    <!-- FORM -->
    <div class="auth-form-box">
      <h3>Login</h3>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>

        <button type="submit" class="auth-btn">Login</button>

        <p class="auth-switch">
          Don’t have an account?
          <a href="register.html">Register</a>
        </p>
      </form>
    </div>

  </div>
</section>

<script>
console.log("login page loaded");

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", async function (e) {
  e.preventDefault();

  console.log("Login button hit");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
const res = await fetch("https://zertix-fullstack.onrender.com/api/auth/register", {
        method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log("Login response:", data);

    // ❌ अगर API fail हुई
    if (!res.ok) {
      alert(data.message || "Login failed ❌");
      return;
    }

    // ✅ SUCCESS
    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("userId", data.userId);

      console.log("Stored token:", localStorage.getItem("token"));

      alert("Login successful 🚀");

      // 🔥 delay ताकि storage properly save हो जाए
      setTimeout(() => {
        window.location.href = "../user/dashboard.html";
      }, 500);

    } else {
      alert("Invalid response ❌");
    }

  } catch (err) {
    console.error("Login error:", err);
    alert("Server error ❌");
  }
});
</script>

</body>
</html>
