<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Zertix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../assets/css/base.css">
</head>
<body>

<section class="auth-section">
  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-info">
      <span class="auth-tag">START CERTIFICATION</span>
      <h2>Create Your<br><span>Zertix Account</span></h2>
      <p>Build a verified professional identity trusted by employers.</p>

      <ul class="auth-points">
        <li>Admin approved certificates</li>
        <li>QR verified credentials</li>
        <li>Lifetime validity</li>
      </ul>
    </div>

    <!-- FORM -->
    <div class="auth-form-box">
      <h3>Create Account</h3>

      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>

        <button type="submit" class="auth-btn">Register</button>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </div>

  </div>
</section>

<script>
  console.log("register page loaded");

  const registerForm = document.getElementById("registerForm");

  registerForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    console.log("Register button hit");

    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("http://localhost:5000/api/auth/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ fullName, email, phone, password })
      });

      const data = await res.json();
      console.log("Register response:", data);

      if (data.userId || data.message) {
        alert("Registration successful ✅");
        window.location.href = "login.html";
      } else {
        alert(data.message || "Registration failed ❌");
      }

    } catch (err) {
      console.error(err);
      alert("Server error ❌");
    }
  });
</script>

</body>
</html>
