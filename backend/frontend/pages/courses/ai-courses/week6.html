<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Course – Final Assessment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#020617;
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
}

.header h1{
  font-size:32px;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#0f172a;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

/* QUESTION */
.question{
  margin-bottom:20px;
}

.question p{
  margin-bottom:10px;
  font-size:16px;
}

/* OPTIONS */
.option{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  background:#020617;
  border:1px solid #1e293b;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:#1e293b;
}

/* RADIO */
.option input{
  accent-color:#22c55e;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* RESULT */
.result{
  text-align:center;
  margin-top:15px;
  font-size:18px;
}

/* BADGE */
.badge{
  text-align:center;
  font-size:22px;
  margin-top:10px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#0f172a;
  padding:25px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h1>🎓 Final Assessment</h1>
<p>Answer all questions to complete your course</p>
</div>

<div class="container">

<div class="card">
<h2>🧠 AI Quiz (20 Questions)</h2>
<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>

<p id="result" class="result"></p>
<div id="badge" class="badge"></div>
</div>

<div class="card">
<h2>🎓 Certificate</h2>
<button onclick="certificate()">Request Certificate</button>
<p id="msg"></p>
</div>

</div>

<!-- SCORE MODAL -->
<div id="scoreModal" class="modal">
  <div class="modal-box">
    <h2>Your Score</h2>
    <p id="scoreText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

// REAL QUESTIONS
const questions = [
["What is Artificial Intelligence?",["Machines that simulate human intelligence","Only robots","Simple calculations","Manual systems"],0],
["What is Machine Learning?",["Learning from data","Manual programming","Hardware system","Database"],0],
["Deep Learning is based on?",["Neural Networks","Simple logic","HTML","CSS"],0],
["Which is AI example?",["ChatGPT","Calculator","Keyboard","Mouse"],0],
["Dataset means?",["Collection of data","Code","Program","Output"],0],
["Supervised learning uses?",["Labeled data","Random data","No data","Static data"],0],
["Unsupervised learning?",["Find patterns","Use labels","Manual coding","No learning"],0],
["Reinforcement learning uses?",["Reward system","Static data","Labels","Nothing"],0],
["Overfitting means?",["Model too specific","Perfect model","Best accuracy","Fast model"],0],
["Underfitting means?",["Model too simple","Perfect model","Fast system","Complex system"],0],
["NLP stands for?",["Natural Language Processing","New Logic Program","Node Level Process","None"],0],
["Computer vision is?",["Image understanding","Text processing","Audio only","Coding"],0],
["AI learns from?",["Data","Nothing","Hardware","User"],0],
["Prediction means?",["Future output","Past data","Random output","None"],0],
["Bias in AI?",["Error in model","Perfect result","Speed issue","Hardware issue"],0],
["Model is?",["Trained system","File","Code","Output"],0],
["Training means?",["Learning process","Execution","Deployment","Testing"],0],
["AI used in healthcare?",["Diagnosis","Typing","Gaming only","None"],0],
["Goal of AI?",["Automation","Manual work","Slow systems","No use"],0],
["AI improves by?",["More data","Less data","No learning","Manual effort"],0]
];

// RENDER
const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
  let optionsHTML="";
  q[1].forEach((opt,index)=>{
    optionsHTML+=`
      <label class="option">
        <input type="radio" name="q${i}" value="${index}">
        ${opt}
      </label>`;
  });

  quiz.innerHTML+=`
  <div class="question">
    <p>${i+1}. ${q[0]}</p>
    ${optionsHTML}
  </div>`;
});

// SUBMIT
function submitQuiz(){
  let score=0;

  questions.forEach((q,i)=>{
    const ans=document.querySelector(`input[name="q${i}"]:checked`);
    if(ans && Number(ans.value)===q[2]) score++;
  });

  document.getElementById("scoreText").innerHTML=
    `You scored ${score}/20`;

  document.getElementById("scoreModal").style.display="flex";

  if(score>=15){
    document.getElementById("badge").innerHTML="🏅 Certified AI Learner 🎉";
  }else{
    document.getElementById("badge").innerHTML="❌ Try Again";
  }
}

// MODAL
function closeModal(){
  document.getElementById("scoreModal").style.display="none";
}

// CERTIFICATE
function certificate(){
  document.getElementById("msg").innerHTML=
  " Congratulation you completed your certification courses and 📩 Our team members will send your certificate to your email shortly.";
}

// SAVE
localStorage.setItem("progress_ai","week6");

</script>

</body>
</html>
