<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Zertix AI Resume Builder
  </title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link
    rel="stylesheet"
    href="../../assets/css/resume-builder.css"
  />

</head>

<body>

<div class="bg-gradient"></div>

<nav class="top-navbar">

  <div class="logo-area">

    <div class="logo-icon">
      Z
    </div>

    <div>

      <h2>Zertix AI</h2>

      <p>
        Resume Intelligence
      </p>

    </div>

  </div>

</nav>

<main class="resume-app">

<section class="editor-panel">

<!-- HERO -->

<div class="hero-card glass-card">

  <h1>
    Upload & Edit Resume
  </h1>

  <p>
    Upload your resume and instantly
    edit all sections professionally.
  </p>

  <label
    for="resumeUpload"
    class="primary-btn"
  >

    <i class="fa-solid fa-upload"></i>

    Upload Resume

  </label>

  <input
    type="file"
    id="resumeUpload"
    hidden
    accept=".pdf,.doc,.docx"
  />

</div>

<!-- ATS SCORE -->

<div
  class="score-grid"
  id="scoreSection"
  style="display:none;"
>

  <div class="score-card glass-card">

    <h2>
      ATS Score
    </h2>

    <div
      class="score-value"
      id="atsScore"
    >
      87%
    </div>

  </div>

</div>

<!-- FORM -->

<div
  class="resume-form-area"
  id="resumeBuilder"
>

<!-- PERSONAL -->

<div class="form-card glass-card">

  <div class="section-title">

    <i class="fa-solid fa-user"></i>

    <h2>
      Personal Information
    </h2>

  </div>

  <div class="form-grid">

    <div class="input-group">

      <label>
        Full Name
      </label>

      <input
        type="text"
        id="fullName"
        placeholder="Your Name"
      />

    </div>

    <div class="input-group">

      <label>
        Email
      </label>

      <input
        type="email"
        id="email"
        placeholder="Email"
      />

    </div>

    <div class="input-group">

      <label>
        Phone
      </label>

      <input
        type="text"
        id="phone"
        placeholder="Phone"
      />

    </div>

    <div class="input-group">

      <label>
        Location
      </label>

      <input
        type="text"
        id="location"
        placeholder="Location"
      />

    </div>

  </div>

</div>

<!-- SUMMARY -->

<div class="form-card glass-card">

  <div class="section-title">

    <i class="fa-solid fa-pen"></i>

    <h2>
      Professional Summary
    </h2>

  </div>

  <textarea
    id="summary"
    rows="5"
    placeholder="Professional Summary"
  ></textarea>

</div>

<!-- SKILLS -->

<div class="form-card glass-card">

  <div class="section-title">

    <i class="fa-solid fa-code"></i>

    <h2>
      Skills
    </h2>

  </div>

  <textarea
    id="skills"
    rows="5"
    placeholder="HTML, CSS, JavaScript"
  ></textarea>

</div>

<!-- EXPERIENCE -->

<div class="form-card glass-card">

  <div class="section-title">

    <i class="fa-solid fa-briefcase"></i>

    <h2>
      Experience
    </h2>

  </div>

  <textarea
    id="experience"
    rows="6"
    placeholder="Work Experience"
  ></textarea>

</div>

<!-- PROJECTS -->

<div class="form-card glass-card">

  <div class="section-title">

    <i class="fa-solid fa-diagram-project"></i>

    <h2>
      Projects
    </h2>

  </div>

  <textarea
    id="projects"
    rows="6"
    placeholder="Projects"
  ></textarea>

</div>

<!-- EDUCATION -->

<div class="form-card glass-card">

  <div class="section-title">

    <i class="fa-solid fa-graduation-cap"></i>

    <h2>
      Education
    </h2>

  </div>

  <textarea
    id="education"
    rows="5"
    placeholder="Education"
  ></textarea>

</div>

<!-- BUTTONS -->

<div class="action-bar">

  <button
    class="primary-btn large-btn"
    id="saveResume"
  >

    <i class="fa-solid fa-floppy-disk"></i>

    Save Resume

  </button>

  <button class="glass-btn large-btn">

    <i class="fa-solid fa-download"></i>

    Download Resume

  </button>

</div>

</div>

</section>

</main>

<!-- SCRIPT -->

<script>

const resumeUpload =
document.getElementById(
  "resumeUpload"
);

const scoreSection =
document.getElementById(
  "scoreSection"
);

const resumeBuilder =
document.getElementById(
  "resumeBuilder"
);

/* ================= UPLOAD ================= */

resumeUpload.addEventListener(
  "change",
  async (e) => {

    const file =
    e.target.files[0];

    if(!file) return;

    const formData =
    new FormData();

    formData.append(
      "resume",
      file
    );

    try {

      const response =
      await fetch(
        "/api/resumes/upload",
        {
          method:"POST",
          body:formData
        }
      );

      const data =
      await response.json();

      if(data.success){

        scoreSection.style.display =
        "grid";

        resumeBuilder.style.display =
        "block";

        /* AUTO FILL */

        document.getElementById(
          "fullName"
        ).value =
        data.parsedData.name || "";

        document.getElementById(
          "email"
        ).value =
        data.parsedData.email || "";

        document.getElementById(
          "phone"
        ).value =
        data.parsedData.phone || "";

        document.getElementById(
          "skills"
        ).value =
        data.parsedData.skills || "";

        document.getElementById(
          "experience"
        ).value =
        data.parsedData.experience || "";

        document.getElementById(
          "projects"
        ).value =
        data.parsedData.projects || "";

        alert(
          "Resume Parsed Successfully"
        );

      }

    }

    catch(err){

      console.log(err);

      alert(
        "Resume Upload Failed"
      );

    }

});

/* ================= SAVE ================= */

document.getElementById(
  "saveResume"
)

.addEventListener(
  "click",
  () => {

    alert(
      "Resume Saved Successfully"
    );

  }
);

</script>

</body>
</html>
