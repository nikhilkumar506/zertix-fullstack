<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SkilllCertify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../assets/css/base.css">
</head>
<body>

<section class="auth-section">
  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-info">
      <span class="auth-tag">SECURE LOGIN</span>
      <h2>Welcome Back to<br><span>SkilllCertify</span></h2>
      <p>Access your courses and verified certificates.</p>

      <ul class="auth-points">
        <li>Secure login</li>
        <li>Verified certificates</li>
        <li>Lifetime access</li>
      </ul>
    </div>

    <!-- FORM -->
    <div class="auth-form-box">
      <h3>Login</h3>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>

        <!-- 🔥 type="submit" IS MUST -->
        <button type="submit" class="auth-btn">Login</button>

        <p class="auth-switch">
          Don’t have an account?
          <a href="register.html">Register</a>
        </p>
      </form>
    </div>

  </div>
</section>

<!-- ✅ CORE AUTH API -->
<script src="../../js/core/auth.js"></script>

<!-- ✅ PAGE LOGIC -->
<script>
  console.log("login page loaded");

  const loginForm = document.getElementById("loginForm");

  loginForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    console.log("Login button hit");

    const data = {
      email: loginForm.email.value,
      password: loginForm.password.value
    };

    try {
      const res = await loginUser(data);
      console.log("Login response:", res);

      if (res.token) {
        localStorage.setItem("token", res.token);
        alert("Login successful");
        window.location.href = "../user/dashboard.html";
      } else {
        alert(res.message || "Login failed");
      }
    } catch (err) {
      console.error(err);
      alert("Server error");
    }
  });
</script>

</body>
</html>
