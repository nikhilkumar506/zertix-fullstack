<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | SkilllCertify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../assets/css/base.css">
</head>
<body>

<section class="auth-section">
  <div class="auth-container">

    <!-- LEFT -->
    <div class="auth-info">
      <span class="auth-tag">START CERTIFICATION</span>
      <h2>Create Your<br><span>SkilllCertify Account</span></h2>
      <p>Build a verified professional identity trusted by employers.</p>

      <ul class="auth-points">
        <li>Admin approved certificates</li>
        <li>QR verified credentials</li>
        <li>Lifetime validity</li>
      </ul>
    </div>

    <!-- FORM -->
    <div class="auth-form-box">
      <h3>Create Account</h3>

      <!-- ❌ onsubmit hata diya -->
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="fullName" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>

        <!-- 🔥 type="submit" MUST -->
        <button type="submit" class="auth-btn">Register</button>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </div>

  </div>
</section>

<!-- ✅ CORE AUTH API -->
<script src="../../js/core/auth.js"></script>

<!-- ✅ PAGE LOGIC -->
<script>
  console.log("register page loaded");

  const registerForm = document.getElementById("registerForm");

  registerForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    console.log("Register button hit");

    const data = {
      fullName: registerForm.fullName.value,
      email: registerForm.email.value,
      phone: registerForm.phone.value,
      password: registerForm.password.value
    };

    try {
      const res = await registerUser(data);
      console.log("Register response:", res);

      if (res.userId) {
        alert("Registration successful");
        window.location.href = "login.html";
      } else {
        alert(res.message || "Registration failed");
      }
    } catch (err) {
      console.error(err);
      alert("Server error");
    }
  });
</script>

</body>
</html>
