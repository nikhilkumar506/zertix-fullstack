<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backend Development – Final Assessment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="backend.css">

<style>

/* QUIZ */
.question{
  margin-bottom:20px;
  padding:15px;
  border-radius:12px;
  background:#f1f5f9;
}

.option{
  display:block;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  cursor:pointer;
  background:white;
  border:1px solid #e2e8f0;
}

.option:hover{
  background:#e0e7ff;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:16px;
  text-align:center;
  width:320px;
}

.modal-box h2{
  color:#7c3aed;
}

</style>
</head>

<body>

<div class="header">
  <h1>🎓 Final Assessment</h1>
  <p>Complete your Backend Development Course</p>
</div>

<div class="container">

<div class="card">
<h2>🧠 Final Quiz (20 Questions)</h2>
<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>

<p id="result"></p>
<div id="badge"></div>
</div>

<div class="card">
<h2>🎓 Certificate</h2>
<button onclick="certificate()">Get Certificate</button>
</div>

</div>

<!-- SCORE MODAL -->
<div id="scoreModal" class="modal">
  <div class="modal-box">
    <h2>Your Score</h2>
    <p id="scoreText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- COMPLETION MODAL -->
<div id="completeModal" class="modal">
  <div class="modal-box">
    <h2>🎉 Course Completed</h2>
    <p>You have successfully completed the Backend course!</p>
    <button onclick="closeComplete()">Continue</button>
  </div>
</div>

<!-- CERTIFICATE MODAL -->
<div id="certModal" class="modal">
  <div class="modal-box">
    <h2>🏅 Congratulations!</h2>
    <p>Your backend course is complete.</p>
    <p>We have sent your certificate to your email 📩</p>
    <button onclick="closeCert()">Close</button>
  </div>
</div>

<script>

// QUESTIONS (20)
const questions = [
["What is backend?",["Server logic","UI","Design","CSS"],0],
["Node.js is?",["Runtime","Browser","DB","OS"],0],
["Express is?",["Framework","DB","OS","Tool"],0],
["API means?",["Communication","Storage","UI","None"],0],
["GET method?",["Fetch data","Send","Delete","Update"],0],
["POST method?",["Send data","Fetch","Delete","None"],0],
["Database?",["Stores data","UI","Code","Design"],0],
["MongoDB?",["NoSQL DB","SQL","Tool","OS"],0],
["CRUD?",["Create Read Update Delete","None","Logic","UI"],0],
["JWT?",["Token","DB","OS","Tool"],0],
["Middleware?",["Function","DB","UI","None"],0],
["Multer?",["File upload","DB","UI","Tool"],0],
["Deployment?",["Live app","Local","Code","UI"],0],
["HTTPS?",["Secure","Fast","Slow","None"],0],
["Password hash?",["Secure","Delete","Show","None"],0],
["Server?",["Handles request","UI","CSS","None"],0],
["Response?",["Server reply","User","DB","None"],0],
["Request?",["Client call","Server","DB","None"],0],
["Auth?",["Verify user","Delete","UI","None"],0],
["Goal?",["Working app","Design","Color","None"],0]
];

// RENDER
const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{
  let options="";
  q[1].forEach((opt,index)=>{
    options+=`
      <label class="option">
        <input type="radio" name="q${i}" value="${index}">
        ${opt}
      </label>`;
  });

  quiz.innerHTML+=`
  <div class="question">
    <p>${i+1}. ${q[0]}</p>
    ${options}
  </div>`;
});

// SUBMIT
function submitQuiz(){
  let score=0;

  questions.forEach((q,i)=>{
    const ans=document.querySelector(`input[name="q${i}"]:checked`);
    if(ans && Number(ans.value)===q[2]) score++;
  });

  document.getElementById("scoreText").innerHTML =
    `You scored ${score}/20`;

  document.getElementById("scoreModal").style.display="flex";

  if(score>=15){
    document.getElementById("badge").innerHTML="🏅 Backend Certified";
    setTimeout(()=>{
      document.getElementById("completeModal").style.display="flex";
    },800);
  } else {
    document.getElementById("badge").innerHTML="❌ Try Again";
  }
}

// CERTIFICATE
function certificate(){
  document.getElementById("certModal").style.display="flex";
}

// CLOSE
function closeModal(){
  document.getElementById("scoreModal").style.display="none";
}
function closeComplete(){
  document.getElementById("completeModal").style.display="none";
}
function closeCert(){
  document.getElementById("certModal").style.display="none";
}

// SAVE
localStorage.setItem("progress_backend","completed");

</script>

</body>
</html>
